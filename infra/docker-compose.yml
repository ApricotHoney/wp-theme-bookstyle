services:
  db:
    image: mariadb:10.6
    container_name: bookstyle_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.5.3-php8.2
    container_name: bookstyle_wp
    restart: always
    depends_on:
      - db
    ports:
      - "8000:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      # Mount the v4/themes directory. RELATIVE path from v4/infra/docker-compose.yml to v4/themes is ../themes
      - ../themes:/var/www/html/wp-content/themes
      # Optional: Custom PHP config
      - ./php.ini:/usr/local/etc/php/conf.d/uploads.ini

  pma:
    image: phpmyadmin:5.2.1
    container_name: bookstyle_pma
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

volumes:
  db_data:
  wp_data:
